<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 虚拟工作室</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
</head>
<body>
  <div class="app-layout">
    <!-- 左侧：2D 办公场景 -->
    <div class="scene-panel" id="scene-panel">
      <div class="scene-header">
        <span class="scene-title-icon">🏢</span>
        <span>AI 虚拟工作室</span>
        <span class="scene-hint">滚轮缩放 · 拖拽移动</span>
      </div>
      <div class="scene-selected-char" id="selected-char-info">
        <span id="char-name">Boss</span>
        <span class="char-role-badge" id="char-role">总负责人</span>
      </div>
      <div id="game-container"></div>
    </div>

    <!-- 右侧：任务 & 对话面板 -->
    <div class="right-panel">
      <!-- 紧凑任务列表 -->
      <div class="task-strip" id="task-strip">
        <div class="task-strip-header">
          <span>📋 任务</span>
          <button class="btn-new" id="btn-new-task">+ 新建</button>
        </div>
        <div class="task-strip-list" id="task-list"></div>
      </div>

      <!-- 对话区 -->
      <div class="main-panel">
        <div class="chat-area" id="chat-messages">
          <div class="chat-welcome">
            <p>👋 点击场景中的角色，或直接在下方输入指令</p>
            <p>支持 @角色名 来指定任务执行者</p>
          </div>
        </div>

        <div class="file-panel" id="file-panel">
          <h4>📦 产出文件</h4>
          <div id="file-list"></div>
        </div>

        <div class="input-area">
          <span class="input-target" id="input-target">发给: 所有人</span>
          <form id="chat-form">
            <textarea id="chat-input" placeholder="输入你的需求..." rows="1"></textarea>
            <button type="submit" class="btn-send">发送</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/state.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/sse.js"></script>
  <script src="/js/scene.js"></script>
  <script src="/js/chat.js"></script>
  <script src="/js/sidebar.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
